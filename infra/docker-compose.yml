services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: construction_reports
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d construction_reports"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
